version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env
    depends_on:
      - api
    command: python app/ui.py